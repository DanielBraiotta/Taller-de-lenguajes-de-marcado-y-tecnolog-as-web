<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eco-Clicker ReTecno</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #e8f5e9; }
        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            margin: 20px auto;
            background: white;
            border: 3px solid #2e7d32;
            overflow: hidden;
            cursor: crosshair;
        }
        .basura {
            position: absolute;
            width: 50px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .basura:hover { transform: scale(1.2); }
        #score { font-size: 24px; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Eco-Clicker: Limpia los Residuos</h1>
    <p>Haz clic en los dispositivos para reciclarlos</p>
    <div id="score">Puntos: 0</div>
    <div id="game-container"></div>
    <p><a href="index.html">Volver al inicio</a></p>

    <script>
        let puntos = 0;
        const contenedor = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');

        function crearBasura() {
            const basura = document.createElement('div');
            basura.className = 'basura';
            basura.innerHTML = '💻'; // Puedes cambiar esto por emojis como 📱, ⌨️, 🖱️
            basura.style.fontSize = '40px';
            
            // Posición aleatoria
            const x = Math.random() * (contenedor.clientWidth - 50);
            const y = Math.random() * (contenedor.clientHeight - 50);
            
            basura.style.left = x + 'px';
            basura.style.top = y + 'px';

            // Al hacer clic
            basura.onclick = () => {
                puntos++;
                scoreDisplay.innerText = "Puntos: " + puntos;
                basura.remove();
                crearBasura(); // Crea uno nuevo al atraparlo
            };

            contenedor.appendChild(basura);

            // Se elimina solo si no le das clic en 2 segundos
            setTimeout(() => {
                if(basura.parentNode) {
                    basura.remove();
                    crearBasura();
                }
            }, 2000);
        }

        // Iniciar con 5 elementos
        for(let i=0; i<5; i++) crearBasura();
    </script>
</body>
</html>
